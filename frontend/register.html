<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetIQ — Create Account</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BudgetIQ">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <a href="index.html" class="auth-back">← Back</a>

  <div class="auth-wrap">
    <!-- Left Panel -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-brand-icon">💰</div>
        <span>BudgetIQ</span>
      </div>
      <h2>Join BudgetIQ Today</h2>
      <p>Start your journey to smarter financial management in seconds.</p>
      <div class="auth-features">
        <div class="auth-feature">
          <span class="auth-feature-icon">✅</span>
          <span class="auth-feature-text">Free to get started</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">📈</span>
          <span class="auth-feature-text">Instant spending insights</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">🎯</span>
          <span class="auth-feature-text">Set & achieve financial goals</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-box">
        <h2>Create Account</h2>
        <p class="auth-sub">Fill in your details to get started</p>

        <div class="form-group">
          <label>Full Name</label>
          <input id="name" type="text" placeholder="Sakshi Bhagat">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="Minimum 6 characters">
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input id="confirm" type="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary btn-block" onclick="register()">Create Account →</button>

        <p class="auth-footer">Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Failed:', err));
      });
    }
  </script>
</body>
</html>
