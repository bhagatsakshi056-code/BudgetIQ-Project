<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetIQ — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="index.html" class="auth-back">← Back</a>

  <div class="auth-wrap">
    <!-- Left Panel -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-brand-icon">💰</div>
        <span>BudgetIQ</span>
      </div>
      <h2>Welcome Back!</h2>
      <p>Sign in to continue managing your finances with smart insights.</p>
      <div class="auth-features">
        <div class="auth-feature">
          <span class="auth-feature-icon">📊</span>
          <span class="auth-feature-text">Real-time spending analytics</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">🎯</span>
          <span class="auth-feature-text">Track your financial goals</span>
        </div>
        <div class="auth-feature">
          <span class="auth-feature-icon">🔒</span>
          <span class="auth-feature-text">Bank-level data security</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-box">
        <h2>Sign In</h2>
        <p class="auth-sub">Enter your credentials to access your dashboard</p>

        <div class="form-group">
          <label>Email Address</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary btn-block" onclick="login()">Sign In →</button>

        <p class="auth-footer">Don't have an account? <a href="register.html">Get Started</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
