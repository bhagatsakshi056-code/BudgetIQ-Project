<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetIQ — Intelligent Finance</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BudgetIQ">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="landing-wrap">
    <div class="landing-logo">💰</div>
    <h1>BudgetIQ</h1>
    <p class="landing-sub">Intelligent Financial Management at Your Fingertips. Track, analyze, and optimize your spending in real-time.</p>

    <div class="landing-features">
      <div class="lf-card">
        <div class="lf-icon">📊</div>
        <h4>Smart Analytics</h4>
        <p>Real-time insights into your spending</p>
      </div>
      <div class="lf-card">
        <div class="lf-icon">🎯</div>
        <h4>Goal Tracking</h4>
        <p>Achieve your financial goals faster</p>
      </div>
      <div class="lf-card">
        <div class="lf-icon">🔒</div>
        <h4>Secure & Private</h4>
        <p>Your data is always protected</p>
      </div>
    </div>

    <div class="landing-actions">
      <button class="btn-white" onclick="window.location='login.html'">Log In</button>
      <button class="btn-white-outline" onclick="window.location='register.html'">Get Started →</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Failed:', err));
      });
    }
  </script>
</body>
</html>
